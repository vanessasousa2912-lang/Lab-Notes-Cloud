<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Car Evolution - Fog & Languages</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #050505; }
        canvas { display: block; }
        
        #ui-left, #ui-right {
            position: absolute;
            top: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #ui-left { left: 20px; width: 280px; }
        #ui-right { right: 20px; width: 240px; }

        .panel {
            background: rgba(10, 10, 10, 0.85);
            color: #ffffff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            margin-bottom: 10px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        
        .stat-val { color: #4ade80; font-weight: bold; font-family: monospace; }
        .leader-item { border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 6px 0; }
        input[type=range] { accent-color: #4ade80; width: 100%; cursor: pointer; }
        
        select {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui-left">
    <div class="panel">
        <div class="flex justify-between items-center mb-2 border-b border-gray-700 pb-1">
            <h2 id="ui-title" class="text-lg font-bold">🧬 Evolução Luis</h2>
            <select id="lang-selector">
                <option value="pt">PT 🇧🇷</option>
                <option value="en">EN 🇺🇸</option>
                <option value="es">ES 🇪🇸</option>
            </select>
        </div>
        <p class="flex justify-between text-sm"><span id="lbl-gen">Geração</span>: <span id="gen-count" class="stat-val">1</span></p>
        <p class="flex justify-between text-sm"><span id="lbl-best">Recorde</span>: <span id="best-dist" class="stat-val">0</span></p>
        <p class="flex justify-between text-sm"><span id="lbl-alive">Vivos</span>: <span id="alive-count" class="stat-val">15/15</span></p>
    </div>

    <div class="panel space-y-3">
        <h3 id="lbl-config" class="text-xs font-bold uppercase text-gray-500">Configurações</h3>
        <div>
            <label class="block text-xs mb-1 uppercase text-gray-400"><span id="lbl-pop">População</span>: <span id="pop-val" class="stat-val">15</span></label>
            <input type="range" id="pop-slider" min="1" max="100" value="15">
        </div>
        <div>
            <label class="block text-xs mb-1 uppercase text-gray-400"><span id="lbl-ray">Sensores</span>: <span id="ray-val" class="stat-val">5</span></label>
            <input type="range" id="ray-slider" min="3" max="25" value="5">
        </div>
        <div>
            <label class="block text-xs mb-1 uppercase text-gray-400"><span id="lbl-speed">Velocidade</span>: <span id="speed-val" class="stat-val">1x</span></label>
            <input type="range" id="speed-slider" min="1" max="20" value="1">
        </div>
    </div>
</div>

<div id="ui-right">
    <div class="panel">
        <h3 id="lbl-lead" class="text-sm font-semibold uppercase text-gray-500 mb-2">🏆 Top Líderes</h3>
        <div id="leaderboard" class="text-xs space-y-1"></div>
    </div>
</div>

<script>
/**
 * LOCALIZAÇÃO (IDIOMAS)
 */
const i18n = {
    pt: {
        title: "🧬 Evolução Luis",
        gen: "Geração",
        best: "Recorde",
        alive: "Vivos",
        config: "Configurações",
        pop: "População",
        ray: "Sensores",
        speed: "Velocidade",
        lead: "🏆 Top Líderes",
        car: "Carro",
        meters: "m"
    },
    en: {
        title: "🧬 Luis Evolution",
        gen: "Generation",
        best: "Record",
        alive: "Alive",
        config: "Settings",
        pop: "Population",
        ray: "Sensors",
        speed: "Speed",
        lead: "🏆 Top Leaders",
        car: "Car",
        meters: "m"
    },
    es: {
        title: "🧬 Evolución Luis",
        gen: "Generación",
        best: "Record",
        alive: "Vivos",
        config: "Configuración",
        pop: "Población",
        ray: "Sensores",
        speed: "Velocidad",
        lead: "🏆 Líderes",
        car: "Coche",
        meters: "m"
    }
};

let currentLang = 'pt';

/**
 * REDE NEURAL
 */
class NeuralNetwork {
    constructor(inputNodes, hiddenNodes, outputNodes, weights = null) {
        this.inputNodes = inputNodes;
        this.hiddenNodes = hiddenNodes;
        this.outputNodes = outputNodes;
        if (weights) {
            this.weightsIH = weights.ih;
            this.weightsHO = weights.ho;
        } else {
            this.weightsIH = Array.from({length: hiddenNodes}, () => 
                Array.from({length: inputNodes}, () => (Math.random() * 2 - 1))
            );
            this.weightsHO = Array.from({length: outputNodes}, () => 
                Array.from({length: hiddenNodes}, () => (Math.random() * 2 - 0.5))
            );
        }
    }
    static sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
    predict(inputs) {
        let hidden = this.weightsIH.map(row => {
            let sum = row.reduce((acc, weight, i) => acc + weight * (inputs[i] || 0), 0);
            return NeuralNetwork.sigmoid(sum);
        });
        return this.weightsHO.map(row => {
            let sum = row.reduce((acc, weight, i) => acc + weight * hidden[i], 0);
            return NeuralNetwork.sigmoid(sum);
        });
    }
    mutate(rate) {
        const m = (v) => (Math.random() < rate ? v + (Math.random() * 2 - 1) * 0.2 : v);
        this.weightsIH = this.weightsIH.map(row => row.map(m));
        this.weightsHO = this.weightsHO.map(row => row.map(m));
    }
    copy() {
        return new NeuralNetwork(this.inputNodes, this.hiddenNodes, this.outputNodes, {
            ih: JSON.parse(JSON.stringify(this.weightsIH)),
            ho: JSON.parse(JSON.stringify(this.weightsHO))
        });
    }
}

/**
 * AMBIENTE
 */
let scene, camera, renderer;
let cars = [];
let generation = 1;
let bestDistance = 0;
let simSpeed = 1;
let trackWidth = 16;
let trackPoints = [];
let trackSegments = [];
let lastPoint = new THREE.Vector3(0, 0, 0);
let trackAngle = 0;

let currentPopSize = 15;
let currentRayCount = 5;
let zoomDistance = 60;

function createNumberTexture(number) {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(255,255,255,1)';
    ctx.beginPath(); ctx.arc(32, 32, 28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.font = 'bold 38px Arial'; ctx.textAlign = 'center';
    ctx.fillText(number, 32, 45);
    return new THREE.CanvasTexture(canvas);
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    
    // --- ADICIONANDO NEBLINA ---
    // Cor preta para misturar com o fundo, início em 50 unidades e densidade máxima em 400
    scene.fog = new THREE.Fog(0x050505, 50, 450);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(100, 300, 100);
    scene.add(sun);

    resetSimulation();
    setupUI();
    animate();

    window.addEventListener('wheel', (e) => {
        zoomDistance += e.deltaY * 0.05;
        zoomDistance = Math.max(15, Math.min(250, zoomDistance));
    });
}

function addTrackSegment() {
    const segmentLength = 60;
    const resolution = 8;
    const points = [lastPoint.clone()];
    
    for(let i=1; i<=resolution; i++) {
        trackAngle += (Math.random() - 0.5) * 0.35;
        const x = lastPoint.x + Math.sin(trackAngle) * (segmentLength / resolution);
        const z = lastPoint.z + Math.cos(trackAngle) * (segmentLength / resolution);
        const targetY = Math.sin(lastPoint.z * 0.015) * 6; 
        const y = THREE.MathUtils.lerp(lastPoint.y, targetY, 0.1);
        
        lastPoint = new THREE.Vector3(x, y, z);
        points.push(lastPoint.clone());
        trackPoints.push(lastPoint.clone());
    }

    const curve = new THREE.CatmullRomCurve3(points);
    const geometry = new THREE.PlaneGeometry(trackWidth, segmentLength, 1, resolution * 2);
    const pos = geometry.attributes.position;
    const curvePoints = curve.getPoints(resolution * 2);
    const curveTangents = [];
    for(let i=0; i<=resolution*2; i++) {
        curveTangents.push(curve.getTangentAt(i / (resolution * 2)));
    }

    for(let i = 0; i <= resolution * 2; i++) {
        const p = curvePoints[i];
        const t = curveTangents[i];
        const normal = new THREE.Vector3(-t.z, 0, t.x).normalize();
        pos.setXYZ(i * 2, p.x - normal.x * trackWidth/2, p.y, p.z - normal.z * trackWidth/2);
        pos.setXYZ(i * 2 + 1, p.x + normal.x * trackWidth/2, p.y, p.z + normal.z * trackWidth/2);
    }
    pos.needsUpdate = true;
    geometry.computeVertexNormals();

    const material = new THREE.MeshPhongMaterial({ 
        color: 0x222222, 
        side: THREE.DoubleSide,
        shininess: 30
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    trackSegments.push(mesh);

    if (trackSegments.length > 40) {
        const old = trackSegments.shift();
        scene.remove(old);
        trackPoints.splice(0, resolution); 
    }
}

class Car {
    constructor(id, brain = null) {
        this.id = id;
        this.brain = brain || new NeuralNetwork(currentRayCount, 14, 2);
        this.fitness = 0;
        this.dist = 0;
        this.alive = true;
        this.idleTime = 0;
        
        this.pos = new THREE.Vector3(0, 1, 5);
        this.rot = 0;
        this.speed = 0;
        this.color = new THREE.Color().setHSL((id * 0.13) % 1, 0.8, 0.6);

        this.group = new THREE.Group();
        
        const carMat = new THREE.MeshPhongMaterial({ color: this.color });
        const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const glassMat = new THREE.MeshPhongMaterial({ color: 0x88ccff, transparent: true, opacity: 0.6 });

        const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 3.2), carMat);
        body.position.y = 0.2;
        this.group.add(body);

        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.5, 1.2), glassMat);
        cockpit.position.set(0, 0.6, -0.2);
        this.group.add(cockpit);

        const wingSupport = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.4, 0.1), carMat);
        wingSupport.position.set(0, 0.6, -1.4);
        this.group.add(wingSupport);
        
        const wing = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 0.6), carMat);
        wing.position.set(0, 0.8, -1.4);
        this.group.add(wing);

        const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12);
        wheelGeom.rotateZ(Math.PI / 2);
        [[-0.85, 0, 1.0], [0.85, 0, 1.0], [-0.85, 0, -1.0], [0.85, 0, -1.0]].forEach(p => {
            const wheel = new THREE.Mesh(wheelGeom, blackMat);
            wheel.position.set(...p);
            this.group.add(wheel);
        });

        const spriteMat = new THREE.SpriteMaterial({ map: createNumberTexture(id), fog: false });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.y = 3.5;
        sprite.scale.set(2.5, 2.5, 1);
        this.group.add(sprite);
        this.numberSprite = sprite;

        scene.add(this.group);
    }

    update() {
        if (!this.alive) return;

        const sensorInputs = this.getSensorData();
        const [accelInput, steerInput] = this.brain.predict(sensorInputs);
        
        const accel = (accelInput * 0.6) - 0.05; 
        const steer = (steerInput - 0.5) * 0.35;

        this.speed = Math.max(0, Math.min(2.2, this.speed + accel));
        this.rot += steer * (this.speed + 0.1);

        this.pos.x += Math.sin(this.rot) * this.speed;
        this.pos.z += Math.cos(this.rot) * this.speed;

        const trackData = this.getTrackInfo(this.pos);
        this.pos.y = THREE.MathUtils.lerp(this.pos.y, trackData.y + 0.5, 0.2);

        this.group.position.copy(this.pos);
        this.group.rotation.y = this.rot;

        if (this.speed < 0.05) this.idleTime++; else this.idleTime = 0;

        if (trackData.distance > (trackWidth / 2) || this.idleTime > 250) {
            this.alive = false;
            this.group.traverse(child => {
                if(child.material) {
                    child.material = child.material.clone();
                    child.material.transparent = true;
                    child.material.opacity = 0.1;
                }
            });
            this.group.remove(this.numberSprite);
        }

        this.dist += this.speed;
        this.fitness = this.dist;
        if (this.fitness > bestDistance) bestDistance = Math.floor(this.fitness);
    }

    getTrackInfo(point) {
        let minDistance = Infinity;
        let closestY = 0;
        const lookBack = Math.max(0, trackPoints.length - 300);
        for (let i = lookBack; i < trackPoints.length; i++) {
            const p = trackPoints[i];
            const d = Math.sqrt((point.x - p.x)**2 + (point.z - p.z)**2);
            if (d < minDistance) {
                minDistance = d;
                closestY = p.y;
            }
        }
        return { distance: minDistance, y: closestY };
    }

    getSensorData() {
        const count = currentRayCount;
        const sensorData = [];
        const range = 70;
        for(let i = 0; i < count; i++) {
            const angleOffset = count > 1 ? ((i / (count - 1)) - 0.5) * (Math.PI * 0.95) : 0;
            const rayRot = this.rot + angleOffset;
            const dir = new THREE.Vector3(Math.sin(rayRot), 0, Math.cos(rayRot));
            let hitDist = range;
            let step = 5;
            let testPos = this.pos.clone();
            for(let d = 0; d < range; d += step) {
                testPos.addScaledVector(dir, step);
                const info = this.getTrackInfo(testPos);
                if (info.distance > (trackWidth / 2)) {
                    hitDist = d;
                    break;
                }
            }
            sensorData.push(hitDist / range);
        }
        return sensorData;
    }

    destroy() { scene.remove(this.group); }
}

function resetSimulation() {
    trackPoints = [new THREE.Vector3(0, 0, 0)];
    trackSegments.forEach(s => scene.remove(s));
    trackSegments = [];
    lastPoint = new THREE.Vector3(0, 0, 0);
    trackAngle = 0;
    for(let i=0; i<20; i++) addTrackSegment();
    generation = 1;
    bestDistance = 0;
    spawnCars();
    updateUIText();
}

function spawnCars(brains = null) {
    cars.forEach(c => c.destroy());
    cars = [];
    for(let i = 0; i < currentPopSize; i++) {
        cars.push(new Car(i + 1, brains ? brains[i] : null));
    }
}

function nextGeneration() {
    cars.sort((a, b) => b.fitness - a.fitness);
    const bestBrain = cars[0].brain.copy();
    const secondBrain = cars[1].brain.copy();
    trackPoints = [new THREE.Vector3(0, 0, 0)];
    trackSegments.forEach(s => scene.remove(s));
    trackSegments = [];
    lastPoint = new THREE.Vector3(0, 0, 0);
    trackAngle = 0;
    for(let i=0; i<20; i++) addTrackSegment();
    const newBrains = [];
    newBrains.push(bestBrain.copy(), secondBrain.copy());
    for(let i = 2; i < currentPopSize; i++) {
        const parent = Math.random() > 0.75 ? bestBrain : secondBrain;
        const child = parent.copy();
        child.mutate(0.15);
        newBrains.push(child);
    }
    generation++;
    spawnCars(newBrains);
    updateUIText();
}

function setupUI() {
    document.getElementById('lang-selector').onchange = (e) => {
        currentLang = e.target.value;
        updateUIText();
    };
    document.getElementById('pop-slider').oninput = (e) => {
        currentPopSize = parseInt(e.target.value);
        document.getElementById('pop-val').innerText = currentPopSize;
        resetSimulation();
    };
    document.getElementById('ray-slider').oninput = (e) => {
        currentRayCount = parseInt(e.target.value);
        document.getElementById('ray-val').innerText = currentRayCount;
        resetSimulation(); 
    };
    document.getElementById('speed-slider').oninput = (e) => {
        simSpeed = parseInt(e.target.value);
        document.getElementById('speed-val').innerText = simSpeed + 'x';
    };
    updateUIText();
}

function updateUIText() {
    const t = i18n[currentLang];
    document.getElementById('ui-title').innerText = t.title;
    document.getElementById('lbl-gen').innerText = t.gen;
    document.getElementById('lbl-best').innerText = t.best;
    document.getElementById('lbl-alive').innerText = t.alive;
    document.getElementById('lbl-config').innerText = t.config;
    document.getElementById('lbl-pop').innerText = t.pop;
    document.getElementById('lbl-ray').innerText = t.ray;
    document.getElementById('lbl-speed').innerText = t.speed;
    document.getElementById('lbl-lead').innerText = t.lead;
    
    document.getElementById('gen-count').innerText = generation;
    document.getElementById('best-dist').innerText = bestDistance + t.meters;
}

function updateLeaderboard() {
    const t = i18n[currentLang];
    const activeCars = [...cars].filter(c => c.alive).sort((a, b) => b.dist - a.dist);
    const leaderboardEl = document.getElementById('leaderboard');
    leaderboardEl.innerHTML = '';
    activeCars.slice(0, 5).forEach((car, index) => {
        const item = document.createElement('div');
        item.className = 'leader-item flex justify-between';
        const isFirst = index === 0;
        item.innerHTML = `
            <span class="${isFirst ? 'text-green-400 font-bold' : ''}">#${car.id} ${t.car}</span>
            <span>${Math.floor(car.dist)}${t.meters}</span>
        `;
        leaderboardEl.appendChild(item);
    });
}

function animate() {
    requestAnimationFrame(animate);

    for(let i = 0; i < simSpeed; i++) {
        let anyAlive = false;
        let maxDist = -Infinity;
        let leaderCar = null;
        cars.forEach(car => {
            car.update();
            if (car.alive) {
                anyAlive = true;
                if (car.dist > maxDist) {
                    maxDist = car.dist;
                    leaderCar = car;
                }
            }
        });
        if (leaderCar && leaderCar.pos.distanceTo(lastPoint) < 400) {
            addTrackSegment();
        }
        if (!anyAlive) {
            nextGeneration();
            break;
        }
    }

    const leader = cars.reduce((prev, curr) => (curr.alive && curr.fitness > prev.fitness) ? curr : prev, cars[0]);
    if (leader) {
        const height = zoomDistance * 0.7;
        const dist = zoomDistance;
        const camOffset = new THREE.Vector3(-Math.sin(leader.rot)*dist, height, -Math.cos(leader.rot)*dist);
        camera.position.lerp(leader.pos.clone().add(camOffset), 0.1);
        camera.lookAt(leader.pos);
    }

    updateLeaderboard();
    const aliveCount = cars.filter(c=>c.alive).length;
    document.getElementById('alive-count').innerText = `${aliveCount}/${currentPopSize}`;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

window.onload = init;
</script>
</body>
</html>
